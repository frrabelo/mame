- name: Prepare and Build AppImage
      run: |
        # 1. Cria a estrutura de pastas padrão exigida para um AppImage (AppDir)
        mkdir -p AppDir/usr/bin
        mkdir -p AppDir/usr/share/applications
        mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
        
        # 2. Copia o executável recém-compilado para dentro da estrutura
        cp ${{ matrix.executable }} AppDir/usr/bin/
        
        # 3. Cria um arquivo .desktop (atalho obrigatório para AppImages)
        cat > AppDir/usr/share/applications/mame.desktop <<EOF
        [Desktop Entry]
        Name=MAME Tiny
        Exec=${{ matrix.executable }}
        Icon=mame
        Type=Application
        Categories=Game;Emulator;
        EOF
        
        # 4. Baixa um ícone genérico do MAME em PNG para satisfazer a criação
        wget -qO AppDir/usr/share/icons/hicolor/256x256/apps/mame.png https://upload.wikimedia.org/wikipedia/commons/thumb/1/1a/MAME_logo.svg/256px-MAME_logo.svg.png
        
        # 5. Baixa a ferramenta linuxdeploy
        wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage
        
        # 6. Empacota tudo (usando --appimage-extract-and-run para evitar problemas de permissão FUSE no GitHub Actions)
        ./linuxdeploy-x86_64.AppImage --appimage-extract-and-run --appdir AppDir -e AppDir/usr/bin/${{ matrix.executable }} -d AppDir/usr/share/applications/mame.desktop -i AppDir/usr/share/icons/hicolor/256x256/apps/mame.png --output appimage
        
    - name: Upload AppImage
      uses: actions/upload-artifact@main
      with:
        name: MAME-Tiny-Linux-AppImage
        path: "*.AppImage"
        if-no-files-found: error
