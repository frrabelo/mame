name: CI (Linux)

on:
  workflow_dispatch:
  push:
    paths:
    - '.github/workflows/**'
    - '3rdparty/**'
    - 'hash/**'
    - 'scripts/**'
    - 'src/**'
    - 'COPYING'
    - 'makefile'

permissions:
  contents: read

jobs:
  build-linux:
    strategy:
      matrix:
        compiler: [gcc]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
            archopts: -U_FORTIFY_SOURCE
            subtarget: tiny
            executable: mametiny
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@main
      with:
        fetch-depth: 0
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsdl2-dev libsdl2-ttf-dev libfontconfig-dev libasound2-dev libxinerama-dev libxi-dev qt6-base-dev qt6-base-dev-tools
        
    - name: Build
      env:
        OVERRIDE_CC: ${{ matrix.cc }}
        OVERRIDE_CXX: ${{ matrix.cxx }}
        ARCHOPTS: ${{ matrix.archopts }}
        SUBTARGET: ${{ matrix.subtarget }}
        TOOLS: 1
      run: make -j$(nproc)
      
    - name: Validate
      run: ./${{ matrix.executable }} -validate
      
    - name: Reconcile driver list
      run: ./${{ matrix.executable }} -listxml | python scripts/build/makedep.py reconcilelist -l src/mame/${{ matrix.subtarget }}.lst -
      
    - name: ORM check
      run: python scripts/minimaws/minimaws.py load --executable ./${{ matrix.executable }} --softwarepath hash
      
    - name: Prepare and Build AppImage
      run: |
        # 1. Cria a estrutura padrão de pastas
        mkdir -p AppDir/usr/bin
        mkdir -p AppDir/usr/share/applications
        mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps
        
        # 2. Copia o executável recém-compilado
        cp ${{ matrix.executable }} AppDir/usr/bin/
        
        # 3. Cria o arquivo de atalho Desktop
        cat > AppDir/usr/share/applications/mame.desktop <<EOF
        [Desktop Entry]
        Name=MAME Tiny
        Exec=${{ matrix.executable }}
        Icon=mame
        Type=Application
        Categories=Game;Emulator;
        EOF
        
        # 4. (SOLUÇÃO) Em vez de baixar da web, cria localmente um ícone SVG para o AppImage
        echo '<svg width="256" height="256" xmlns="http://www.w3.org/2000/svg"><rect width="256" height="256" fill="#000"/><text x="128" y="128" fill="#fff" font-size="48" font-family="sans-serif" text-anchor="middle" dominant-baseline="middle">MAME</text></svg>' > AppDir/usr/share/icons/hicolor/scalable/apps/mame.svg
        
        # 5. Baixa o linuxdeploy (sem a tag oculta, para que possamos ver erros se a rede do GitHub oscilar)
        wget -O linuxdeploy-x86_64.AppImage https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage
        
        # 6. (SOLUÇÃO) Extrai e roda a ferramenta manualmente para anular o problema de "libfuse2" dos servidores Ubuntu 22.04
        ./linuxdeploy-x86_64.AppImage --appimage-extract
        ./squashfs-root/AppRun --appdir AppDir -e AppDir/usr/bin/${{ matrix.executable }} -d AppDir/usr/share/applications/mame.desktop -i AppDir/usr/share/icons/hicolor/scalable/apps/mame.svg --output appimage
        
    - name: Upload AppImage
      uses: actions/upload-artifact@main
      with:
        name: MAME-Tiny-Linux-AppImage
        path: "*.AppImage"
        if-no-files-found: error
